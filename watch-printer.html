<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch List Printer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #e8f5ee;
    --surface: #f2fbf6;
    --surface2: #d4ecde;
    --border: #96ccb0;
    --text: #0a1f14;
    --text-muted: #3d7a58;
    --accent: #1a6fd4;
    --accent-fg: #ffffff;
    --accent-light: #4a9aee;
    --high: #e8650a;
    --low: #1a9e6e;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --preview-bg: #d8eee2;
  }

  [data-theme=dark] {
    --bg: #0c1f14;
    --surface: #102a1c;
    --surface2: #163824;
    --border: #1e4c30;
    --text: #c0e8d0;
    --text-muted: #3d7a58;
    --accent: #2a82e8;
    --accent-fg: #ffffff;
    --accent-light: #2a82e8;
    --high: #e8760a;
    --low: #22b87a;
    --preview-bg: #0e2418;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
    transition: background 0.2s, color 0.2s;
  }

  .layout {
    max-width: 560px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    flex: 1;
  }

  .nav-tabs { display: flex; gap: 0.25rem; }

  .nav-tab {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 700;
    text-decoration: none;
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .nav-tab:hover { border-color: var(--accent-light); color: var(--text); }
  .nav-tab.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }


  .theme-btn {
    background: none;
    border: none;
    padding: 0.2rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.15s;
    line-height: 0;
    flex-shrink: 0;
  }
  .theme-btn:hover { color: var(--text); }

  .printer-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    font-family: var(--mono);
    color: var(--text-muted);
    margin-top: 1rem;
    margin-bottom: 1.5rem;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #aaa;
    transition: background 0.3s;
  }
  .status-dot.ok { background: var(--low); }
  .status-dot.error { background: var(--high); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    transition: background 0.2s, border-color 0.2s;
  }

  .card h2 {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 0.35rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  textarea {
    width: 100%;
    font-family: var(--sans);
    font-size: 0.95rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.2s;
    margin-bottom: 0.4rem;
    resize: none;
    rows: 3;
  }
  textarea:focus { border-color: var(--accent-light); }

  .field-hint {
    font-size: 0.72rem;
    font-family: var(--mono);
    color: var(--text-muted);
    margin-bottom: 1rem;
    display: block;
  }

  @media (max-width: 680px) {
    textarea { font-size: 16px; }
    header { flex-wrap: wrap; gap: 0.5rem; }
    header h1 { font-size: 1.1rem; flex: 1; }
    .nav-tabs { width: 100%; }
    .nav-tab { flex: 1; text-align: center; }
  }

  .ticket-preview {
    font-family: var(--mono);
    font-size: 0.78rem;
    background: var(--preview-bg);
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 1rem;
    white-space: pre-wrap;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 1rem;
    overflow-x: auto;
    transition: background 0.2s;
    text-align: left;
  }

  .preview-center {
    display: block;
    text-align: center;
  }

  .preview-big {
    font-size: 1.56rem;
    font-weight: 700;
    display: block;
    text-align: center;
    line-height: 1.4;
  }

  .print-btn {
    width: 100%;
    padding: 0.75rem;
    background: var(--accent);
    color: var(--accent-fg);
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .print-btn:hover { opacity: 0.88; }
  .print-btn:active { transform: scale(0.98); }
  .print-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--accent);
    color: var(--accent-fg);
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 0.6rem 1rem;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 99;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="layout">
  <header>
    <h1>// watch list</h1>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()"></button>
    <nav class="nav-tabs">
      <a class="nav-tab" href="/">Tasks</a>
      <a class="nav-tab" href="/lists">Lists</a>
      <a class="nav-tab active" href="/watch">Watch</a>
    </nav>
  </header>

  <div class="printer-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">checking printer...</span>
  </div>

  <div class="card">
    <h2>New Watch Ticket</h2>

    <label>Title</label>
    <textarea id="title" rows="3" placeholder="Movie or show title..."></textarea>
    <span class="field-hint">Enter for manual line break</span>

    <label>Preview</label>
    <div class="ticket-preview" id="preview"></div>

    <button class="print-btn" id="printBtn" onclick="printWatch()">PRINT TICKET</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';

const ICON_MOON = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
const ICON_SUN  = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.78" y2="4.22"/></svg>';

const savedTheme = localStorage.getItem('theme') || 'light';
applyTheme(savedTheme);

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').innerHTML = t === 'dark' ? ICON_SUN : ICON_MOON;
}

function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
}

function wrapText(text, maxW) {
  var words = text.split(' ');
  var lines = [];
  var cur = '';
  for (var i = 0; i < words.length; i++) {
    var word = words[i];
    var candidate = cur ? cur + ' ' + word : word;
    if (candidate.length > maxW) {
      if (cur) lines.push(cur);
      cur = word.slice(0, maxW);
    } else {
      cur = candidate;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

function getWrappedLines(rawTitle) {
  var halfW = Math.floor(42 / 2);
  var segments = rawTitle.split('\n');
  var lines = [];
  for (var i = 0; i < segments.length; i++) {
    var wrapped = wrapText(segments[i].trim(), halfW);
    if (wrapped.length === 0) wrapped = [''];
    lines = lines.concat(wrapped);
  }
  return lines;
}

function updatePreview() {
  var raw = document.getElementById('title').value || 'Movie or Show Title';
  var w = 42;
  var dbl = '='.repeat(w);
  var NL = '\n';
  var lines = getWrappedLines(raw.trim() || 'Movie or Show Title');

  var out = '';
  out += '<span class="preview-center">' + dbl + '</span>' + NL;
  lines.forEach(function(line) {
    out += '<span class="preview-big">' + (line || '&nbsp;') + '</span>';
  });
  out += NL;
  out += '<span class="preview-center">' + dbl + '</span>';
  document.getElementById('preview').innerHTML = out;
}

document.getElementById('title').addEventListener('input', updatePreview);
document.getElementById('title').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); printWatch(); }
});
updatePreview();

async function printWatch() {
  var title = document.getElementById('title').value.trim();
  if (!title) { showToast('Please enter a title'); return; }
  var btn = document.getElementById('printBtn');
  btn.disabled = true;
  btn.textContent = 'SENDING...';
  try {
    var res = await fetch(API + '/print-watch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title })
    });
    var data = await res.json();
    if (data.ok) {
      document.getElementById('title').value = '';
      updatePreview();
      showToast('Ticket sent to printer');
    } else {
      showToast('Print error: ' + (data.error || 'unknown'));
    }
  } catch (e) {
    showToast('Cannot reach print server');
  }
  btn.disabled = false;
  btn.textContent = 'PRINT TICKET';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

async function checkStatus() {
  var dot = document.getElementById('statusDot');
  var txt = document.getElementById('statusText');
  try {
    var res = await fetch(API + '/status', { signal: AbortSignal.timeout(3000) });
    var data = await res.json();
    dot.className = 'status-dot ok';
    txt.textContent = 'printer ready | ' + data.printer;
  } catch {
    dot.className = 'status-dot error';
    txt.textContent = 'print server offline';
  }
}

checkStatus();
setInterval(checkStatus, 15000);
</script>
</body>
</html>
